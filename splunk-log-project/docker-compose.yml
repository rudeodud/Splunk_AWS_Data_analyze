services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: splunk-backend
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - backend-logs:/app/logs
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: splunk-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  backend-logs:
