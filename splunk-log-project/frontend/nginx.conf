server {
    listen 80;

    # 1. 정적 파일(UI) 서빙: 루트(/) 및 모든 경로 포함
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. API 요청만 백엔드로 전달 (정확히 /orders 경로만)
    # location 뒤에 = 를 붙여서 /orders/index.html 과의 혼동을 피합니다.
    location = /orders {
        proxy_pass http://backend:3000/orders;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
