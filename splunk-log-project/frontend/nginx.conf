server {
    listen 80;

    # 정적 파일 서빙 (index.html)
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # /orders 요청을 백엔드로 프록시
    location /orders {
        proxy_pass http://backend:3000/orders;
        # docker-compose 네트워크에서 backend 서비스명으로 접근
        # index.html의 fetch('/orders') 요청이 여기로 들어옴
        # → http://backend:3000/orders 로 전달

        proxy_set_header Host $host;
        # 원본 호스트 헤더 전달

        proxy_set_header X-Real-IP $remote_addr;
        # 원본 클라이언트 IP를 백엔드에 전달
        # req.headers['x-real-ip'] 로 접근 가능
    }
}