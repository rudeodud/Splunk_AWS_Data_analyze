server {
    listen 80;

    # UI 파일을 /orders/ 경로에서 서빙
    location /orders/ {
        alias /usr/share/nginx/html/;
        index index.html;
    }

    # API 요청 (정확히 /orders 로 들어오는 POST/GET만 프록시)
    location = /orders {
        proxy_pass http://backend:3000/orders;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
